syntax = "proto3";

package containarium.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "containarium/v1/container.proto";
import "containarium/v1/recipe.proto";

option go_package = "github.com/footprintai/containarium/pkg/pb/containarium/v1;containariumv1";

// =============================================================================
// Agent skills — Phase 0 (agent-as-a-box). See docs/AGENT-SKILLS-CREWS-DESIGN.md.
//
// An "agent skill" is a packaged, runnable agent: a Recipe (the box) plus an
// agent manifest (who it is, what tools it may call, who it may talk to). This
// file is the generic mechanism only — concrete skills ship outside this repo.
//
// Crews (collaborating sets of skills) and the agent-to-agent (A2A) transport
// are deferred to later phases (A2A: Phase 1; allowed_peers enforcement:
// Phase 2; Crew/CrewService: Phase 3). The `allowed_peers` field is defined
// here so manifests are forward-compatible, but it is inert until Phase 2.
// =============================================================================

// AgentCard is the discovery document a skill serves so peer agents can find
// it and learn how to delegate to it (A2A, Phase 1). It is carried in-proto so
// the wire format stays insulated from upstream A2A churn.
message AgentCard {
  // Stable handle used by peers to address this agent (e.g. "researcher").
  string id = 1;

  // Human-readable name.
  string name = 2;

  // What this agent does — surfaced to peers and to a planner.
  string description = 3;

  // Free-form capability tags a planner can match against (e.g.
  // "web-search", "code-review", "summarize").
  repeated string capabilities = 4;

  // JSON Schema describing the task input this agent accepts.
  string input_schema_json = 5;

  // JSON Schema describing the artifact this agent returns.
  string output_schema_json = 6;
}

// AgentSkill is a packaged, runnable agent: a Recipe (the box — image,
// resources, GPU) plus the agent layer (who it is, what tools it may call,
// who it may talk to). This is the unit `containarium agent run` launches.
//
// Key invariant: allowed_scopes and allowed_peers are typed, first-class
// fields — NOT a prompt string. allowed_scopes is minted into the agent's JWT
// at launch; allowed_peers compiles into eBPF network policy (Phase 2). The
// typing IS the security boundary.
message AgentSkill {
  // Stable skill identifier (e.g. "web-researcher").
  string id = 1;

  // Display name.
  string name = 2;

  // Short description.
  string description = 3;

  // The box this agent runs in. Either reference a built-in recipe by id, or
  // inline an ad-hoc recipe definition (exactly one).
  oneof box {
    // Reference an existing recipe by id (e.g. "agent-runtime").
    string recipe_id = 4;
    // Inline recipe definition for one-off skills.
    Recipe recipe = 5;
  }

  // System prompt / persona handed to the model inside the box.
  string system_prompt = 6;

  // Platform MCP scopes this agent is permitted to use (e.g.
  // "containers:read", "containers:create"). Validated against the scope
  // taxonomy in internal/auth/scopes.go; minted into the agent's JWT at
  // launch. Least-privilege: a skill gets ONLY what it declares.
  repeated string allowed_scopes = 7;

  // A2A discovery document this skill serves (Phase 1).
  AgentCard agent_card = 8;

  // IDs of the OTHER skills this skill is permitted to send A2A tasks to.
  // In Phase 2 this list compiles to an eBPF NetworkPolicy egress allowlist,
  // so an agent literally cannot open a socket to a non-allowed peer (enforced
  // in-kernel, not in prompt). A skill that is only allowed one peer cannot
  // reach any other. An empty list = talks to no peer (leaf agent). Inert
  // until Phase 2.
  repeated string allowed_peers = 9;

  // Model identifier the runtime should drive this agent with (e.g.
  // "claude-opus-4-8"). Empty = runtime default.
  string model = 10;
}

// ---- AgentSkillService request/response messages ----------------------------

message ListAgentSkillsRequest {}
message ListAgentSkillsResponse {
  repeated AgentSkill skills = 1;
}

message GetAgentSkillRequest {
  string id = 1;
}
message GetAgentSkillResponse {
  AgentSkill skill = 1;
}

// RunAgentSkillRequest launches a single skill in its box and sends it one
// task (no peers). Useful for testing a skill in isolation.
message RunAgentSkillRequest {
  string skill_id = 1;
  // Target backend/pool placement, same scheme as recipes.
  string backend_id = 2;
  string pool = 3;
  // JSON task input matching the skill's agent_card input schema.
  string input_json = 4;
}
message RunAgentSkillResponse {
  // The box the agent ran in.
  Container container = 1;
  // JSON artifact matching the skill's output schema.
  string artifact_json = 2;
}

// ---- A2A (agent-to-agent) task contract (Phase 1) ---------------------------
//
// One agent delegates a task to a peer and gets an artifact back. The shape
// mirrors the A2A (Agent2Agent) protocol's task/artifact lifecycle but is
// carried in our own proto so the wire format stays insulated from upstream
// A2A churn (see "A2A is young" in the design note). Transport + the in-box
// A2A server are wired in #569; this file defines only the contract.

// AgentTaskState tracks the lifecycle of a delegated A2A task.
enum AgentTaskState {
  AGENT_TASK_STATE_UNSPECIFIED = 0;
  AGENT_TASK_STATE_SUBMITTED = 1;
  AGENT_TASK_STATE_WORKING = 2;
  AGENT_TASK_STATE_COMPLETED = 3;
  AGENT_TASK_STATE_FAILED = 4;
}

// AgentTask is one unit of work delegated to a peer agent.
message AgentTask {
  // Task identifier (assigned by the caller; unique within a run).
  string id = 1;
  // JSON task input matching the peer's agent_card input schema.
  string input_json = 2;
}

// AgentArtifact is the result a peer agent returns for a task.
message AgentArtifact {
  // The task this artifact answers.
  string task_id = 1;
  // JSON output matching the peer's agent_card output schema.
  string output_json = 2;
  // Terminal state of the task.
  AgentTaskState state = 3;
  // Human-readable error when state is FAILED.
  string error = 4;
}

// SendAgentTaskRequest delegates a task to a running peer agent. The peer is
// addressed by its agent_card.id (or skill id). In Phase 2 the daemon will
// reject a send to a peer not in the caller's allowed_peers; in Phase 1 the
// field set is established and the send is best-effort over A2A.
message SendAgentTaskRequest {
  // The calling skill (for attribution + the future allowed_peers check).
  string from_skill_id = 1;
  // The target peer to deliver the task to.
  string to_peer_id = 2;
  // JSON task input matching the peer's agent_card input schema.
  string input_json = 3;

  // Correlation id threaded through the audit trail for this delegation. A
  // caller (e.g. a crew, Phase 3) sets it so every hop of a run shares one id;
  // when empty the daemon generates one. Echoed back in the response.
  string trace_id = 4;
}

// SendAgentTaskResponse returns the peer's artifact.
message SendAgentTaskResponse {
  AgentArtifact artifact = 1;
  // The trace id this hop was audited under (generated if the request omitted
  // one). Lets a caller chain subsequent hops under the same id.
  string trace_id = 2;
}

// AgentSkillService manages and runs individual packaged agents.
service AgentSkillService {
  // ListAgentSkills returns all available skills (built-in + registered).
  rpc ListAgentSkills(ListAgentSkillsRequest) returns (ListAgentSkillsResponse) {
    option (google.api.http) = {
      get: "/v1/agent-skills"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List agent skills";
      description: "Returns all packaged agent skills that can be run individually or composed into a crew.";
      tags: "Agents";
    };
  }

  // GetAgentSkill returns a single skill definition by id.
  rpc GetAgentSkill(GetAgentSkillRequest) returns (GetAgentSkillResponse) {
    option (google.api.http) = {
      get: "/v1/agent-skills/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get agent skill";
      description: "Returns one skill's definition, including its agent card, allowed scopes, and allowed peers.";
      tags: "Agents";
    };
  }

  // RunAgentSkill launches a single skill in a box and runs one task against
  // it. The agent's JWT is minted with exactly the skill's allowed_scopes.
  rpc RunAgentSkill(RunAgentSkillRequest) returns (RunAgentSkillResponse) {
    option (google.api.http) = {
      post: "/v1/agent-skills/{skill_id}/run"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Run an agent skill";
      description: "Provisions the skill's box, mints a scoped token, runs one task, and returns the artifact.";
      tags: "Agents";
    };
  }

  // SendAgentTask delegates a task to a running peer agent over A2A and returns
  // the peer's artifact. Phase 1 establishes the transport; Phase 2 adds the
  // allowed_peers / network-policy enforcement around it. (Server impl: #569.)
  rpc SendAgentTask(SendAgentTaskRequest) returns (SendAgentTaskResponse) {
    option (google.api.http) = {
      post: "/v1/agent-skills/{to_peer_id}/call"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Send a task to a peer agent (A2A)";
      description: "Delegates a task to a running peer agent over the agent-to-agent transport and returns the peer's artifact.";
      tags: "Agents";
    };
  }
}
