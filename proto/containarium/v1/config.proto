syntax = "proto3";

package containarium.v1;

import "containarium/v1/container.proto";

option go_package = "github.com/footprintai/containarium/pkg/pb/containarium/v1;containariumv1";

// Config represents the system-wide configuration for Containarium
message Config {
  // Incus configuration
  IncusConfig incus = 1;

  // Default resource limits for new containers
  ResourceLimits default_resources = 2;

  // Default container image
  string default_image = 3;

  // Enable Docker support by default
  bool default_docker_enabled = 4;

  // Network configuration
  NetworkConfig network = 5;

  // Storage configuration
  StorageConfig storage = 6;

  // Security configuration
  SecurityConfig security = 7;

  // Default OS type for new containers
  OSType default_os_type = 8;
}

// IncusConfig contains Incus-specific configuration
message IncusConfig {
  // Incus socket path (default: /var/lib/incus/unix.socket)
  string socket_path = 1;

  // Project name to use (default: default)
  string project = 2;

  // Remote name (default: local)
  string remote = 3;

  // Timeout for Incus operations in seconds
  int32 timeout_seconds = 4;
}

// NetworkConfig contains network-related configuration
message NetworkConfig {
  // Network bridge name (default: incusbr0)
  string bridge_name = 1;

  // Subnet for container IPs (e.g., "10.0.3.0/24")
  string subnet = 2;

  // DHCP range start
  string dhcp_range_start = 3;

  // DHCP range end
  string dhcp_range_end = 4;

  // DNS servers for containers
  repeated string dns_servers = 5;

  // Enable IPv6
  bool enable_ipv6 = 6;
}

// StorageConfig contains storage-related configuration
message StorageConfig {
  // Storage pool name
  string pool_name = 1;

  // Storage driver (e.g., "dir", "zfs", "btrfs")
  string driver = 2;

  // Storage pool path
  string pool_path = 3;

  // Default disk quota for containers
  string default_disk_quota = 4;
}

// SecurityConfig contains security-related configuration
message SecurityConfig {
  // Use unprivileged containers (recommended: true)
  bool unprivileged_containers = 1;

  // AppArmor profile to use (default: "default")
  string apparmor_profile = 2;

  // SELinux context (if using SELinux)
  string selinux_context = 3;

  // Enable seccomp filtering
  bool enable_seccomp = 4;

  // Require SSH keys (don't allow password auth)
  bool require_ssh_keys = 5;

  // Minimum password length if passwords are allowed
  int32 min_password_length = 6;
}

// GetConfigRequest is the request to get current configuration
message GetConfigRequest {}

// GetConfigResponse is the response from getting configuration
message GetConfigResponse {
  // Current configuration
  Config config = 1;
}

// UpdateConfigRequest is the request to update configuration
message UpdateConfigRequest {
  // Updated configuration
  Config config = 1;

  // Fields to update (if empty, update all)
  repeated string update_mask = 2;
}

// UpdateConfigResponse is the response from updating configuration
message UpdateConfigResponse {
  // Success message
  string message = 1;

  // Updated configuration
  Config config = 2;
}

// SystemInfo contains information about the host system
message SystemInfo {
  // Incus version
  string incus_version = 1;

  // Operating system
  string os = 2;

  // Kernel version
  string kernel_version = 3;

  // Total CPU cores
  int32 total_cpus = 4;

  // Total memory in bytes
  int64 total_memory_bytes = 5;

  // Available memory in bytes
  int64 available_memory_bytes = 6;

  // Total disk space in bytes
  int64 total_disk_bytes = 7;

  // Available disk space in bytes
  int64 available_disk_bytes = 8;

  // Number of containers running
  int32 containers_running = 9;

  // Number of containers stopped
  int32 containers_stopped = 10;

  // Total number of containers
  int32 containers_total = 11;

  // Hostname of the system
  string hostname = 12;

  // Uptime in seconds
  int64 uptime_seconds = 13;

  // Container network CIDR (e.g., "10.100.0.0/24")
  string network_cidr = 14;

  // CPU load average (1 minute)
  double cpu_load_1min = 15;

  // CPU load average (5 minutes)
  double cpu_load_5min = 16;

  // CPU load average (15 minutes)
  double cpu_load_15min = 17;

  // GPU information
  repeated GPUInfo gpus = 18;

  // Backend ID (e.g., "tunnel-node-a-gpu") — set when returned from peer
  string backend_id = 19;

  // OTLP collector endpoint (e.g., "http://10.0.3.5:4318") that
  // monitoring=true containers ship app telemetry to. Empty when the
  // core OTel collector isn't provisioned. Advertised here so a tenant
  // or agent can discover where to point OTEL_EXPORTER_OTLP_ENDPOINT —
  // in particular for docker-in-LXC apps that don't inherit the
  // env-stamped value. See #370.
  string otel_collector_endpoint = 20;

  // Containarium daemon version of this backend (e.g. "0.21.0"), so the
  // fleet's running versions + drift are visible via get_system_info and
  // /v1/backends without SSHing each host. See #354.
  string daemon_version = 21;

  // Public SSH entrypoint (the sentinel host) clients dial to reach this
  // backend's containers — the daemon's advertised --ssh-host. **Empty means
  // this backend advertises NO external SSH entrypoint** (direct / in-network
  // mode: reach containers by IP, or deploy through an in-network pipeline).
  // Surfaced so an agent can tell, from get_system_info alone, whether an
  // external SSH/deploy entrypoint exists and what host it is — instead of
  // assuming a sentinel that may not exist. See #1011.
  string ssh_ingress_host = 22;
}

// GPU vendor enum
enum GPUVendor {
  GPU_VENDOR_UNSPECIFIED = 0;
  GPU_VENDOR_NVIDIA = 1;
  GPU_VENDOR_AMD = 2;
  GPU_VENDOR_INTEL = 3;
}

// GPU model enum (common datacenter and workstation GPUs)
enum GPUModel {
  GPU_MODEL_UNSPECIFIED = 0;

  // NVIDIA Consumer
  GPU_MODEL_NVIDIA_RTX_4090 = 100;
  GPU_MODEL_NVIDIA_RTX_4080 = 101;
  GPU_MODEL_NVIDIA_RTX_4070_TI = 102;
  GPU_MODEL_NVIDIA_RTX_4070 = 103;
  GPU_MODEL_NVIDIA_RTX_3090 = 104;
  GPU_MODEL_NVIDIA_RTX_3080 = 105;
  GPU_MODEL_NVIDIA_RTX_5090 = 106;
  GPU_MODEL_NVIDIA_RTX_5080 = 107;

  // NVIDIA Datacenter
  GPU_MODEL_NVIDIA_A100 = 200;
  GPU_MODEL_NVIDIA_A10 = 201;
  GPU_MODEL_NVIDIA_A10G = 202;
  GPU_MODEL_NVIDIA_H100 = 203;
  GPU_MODEL_NVIDIA_H200 = 204;
  GPU_MODEL_NVIDIA_L4 = 205;
  GPU_MODEL_NVIDIA_L40 = 206;
  GPU_MODEL_NVIDIA_L40S = 207;
  GPU_MODEL_NVIDIA_T4 = 208;
  GPU_MODEL_NVIDIA_V100 = 209;
  GPU_MODEL_NVIDIA_B200 = 210;

  // AMD
  GPU_MODEL_AMD_MI300X = 300;
  GPU_MODEL_AMD_MI250X = 301;
  GPU_MODEL_AMD_RX_7900_XTX = 302;

  // Intel
  GPU_MODEL_INTEL_MAX_1550 = 400;
  GPU_MODEL_INTEL_ARC_A770 = 401;
}

// GPUInfo represents a GPU device on the system
message GPUInfo {
  // GPU vendor
  GPUVendor vendor = 1;

  // GPU model (known models mapped to enum, or UNSPECIFIED for unknown)
  GPUModel model = 2;

  // Raw model name string from the driver (for display when model is UNSPECIFIED)
  string model_name = 3;

  // PCI address (e.g., "0000:0b:00.0")
  string pci_address = 4;

  // Driver version (e.g., "570.86.15")
  string driver_version = 5;

  // CUDA version (e.g., "12.7") — NVIDIA only
  string cuda_version = 6;

  // VRAM in bytes (when available)
  int64 vram_bytes = 7;
}

// GetSystemInfoRequest is the request to get system information
message GetSystemInfoRequest {}

// GetSystemInfoResponse is the response from getting system information
message GetSystemInfoResponse {
  // System information (local/primary backend)
  SystemInfo info = 1;

  // System information from peer backends (tunnel-connected)
  repeated SystemInfo peers = 2;
}

// GetLatestReleaseRequest is the request for the latest-release check.
message GetLatestReleaseRequest {}

// GetLatestReleaseResponse reports the latest published release vs the
// running daemon version. See #354.
message GetLatestReleaseResponse {
  // Latest release tag from GitHub (e.g. "v0.21.2"). Empty when the lookup
  // hasn't succeeded yet (e.g. rate-limited with no cached value).
  string latest_release = 1;

  // This daemon's running version (e.g. "0.21.0").
  string current_version = 2;

  // True when latest_release is a newer semver than current_version.
  bool update_available = 3;
}

// ValidateGPURequest asks a backend to prove GPU passthrough works from inside
// an LXC. See #316.
message ValidateGPURequest {
  // Backend to validate. Empty = the local/primary daemon's own host.
  string backend_id = 1;

  // Specific GPU PCI address (e.g. "0000:01:00.0"). Empty = pass through all
  // GPUs. Prefer PCI over a DRM index — it's stable across kernel upgrades.
  string pci = 2;
}

// ValidateGPUResponse reports whether the GPU is usable from inside an LXC on
// the backend: the daemon launches a throwaway nvidia.runtime LXC, runs
// nvidia-smi inside, tears it down, and returns the parsed model + driver.
message ValidateGPUResponse {
  enum GPUStatus {
    GPU_STATUS_UNSPECIFIED = 0;
    GPU_STATUS_OK = 1;          // nvidia-smi saw the GPU inside the LXC
    GPU_STATUS_UNAVAILABLE = 2; // no GPU / passthrough not visible / setup failed
    GPU_STATUS_DEGRADED = 3;    // reserved (e.g. present but reporting errors)
  }

  GPUStatus status = 1;
  string gpu_model = 2;      // e.g. "NVIDIA GeForce RTX 3090"
  string driver_version = 3; // e.g. "570.211.01"
  string detail = 4;         // populated when status != OK
  string backend_id = 5;     // echoes the validated backend ("" = local)
}

// TriggerUpgradeRequest asks a backend to upgrade its daemon binary now instead
// of waiting for the periodic auto-update tick. The daemon pulls the binary the
// sentinel currently serves (SHA-verified), smoke-tests it, swaps atomically
// (keeping the previous binary as .old), and restarts. See #354 Phase B.
message TriggerUpgradeRequest {
  // Backend to upgrade. Empty = the local/primary daemon's own host.
  string backend_id = 1;

  // Upgrade even if the sentinel-served binary already matches the running one.
  bool force = 2;
}

// TriggerUpgradeResponse acknowledges that an upgrade was started. The upgrade
// runs asynchronously (the daemon restarts), so callers poll GetUpgradeStatus
// or watch the backend's version in ListBackends for the outcome. See #354.
message TriggerUpgradeResponse {
  // Opaque id for polling via GetUpgradeStatus.
  string upgrade_id = 1;

  // Status at acknowledgement time: "in_progress" (started) or "noop"
  // (already up to date and force=false).
  string status = 2;

  // The daemon version running when the upgrade was triggered.
  string current_version = 3;

  // Human-readable detail (e.g. why it was a noop).
  string message = 4;

  // Echoes the targeted backend ("" = local).
  string backend_id = 5;
}

// GetUpgradeStatusRequest polls an upgrade started by TriggerUpgrade.
message GetUpgradeStatusRequest {
  string upgrade_id = 1;
}

// GetUpgradeStatusResponse reports an upgrade's progress. Note: a local
// self-upgrade restarts the daemon, dropping in-memory job state — after a
// restart this returns status "unknown" and callers should compare the
// backend's version in ListBackends instead. See #354.
message GetUpgradeStatusResponse {
  // One of: "in_progress", "completed", "failed", "noop", "unknown".
  string status = 1;

  // Daemon version recorded when the upgrade was triggered.
  string current_version = 2;

  // Error detail when status == "failed".
  string error = 3;

  // RFC3339 completion time when status is "completed" or "failed".
  string completed_at = 4;
}

// NetworkPolicyMode controls whether a tenant's network policy is enforced or
// only observed. Phase A ships log_only; Phase B flips to enforce. See
// docs/security/NETWORK-ISOLATION-DESIGN.md (#315).
enum NetworkPolicyMode {
  NETWORK_POLICY_MODE_UNSPECIFIED = 0; // treated as LOG_ONLY in Phase A
  NETWORK_POLICY_MODE_LOG_ONLY = 1;    // observe + audit denied flows; drop nothing
  NETWORK_POLICY_MODE_ENFORCE = 2;     // actually drop denied flows
}

// NetworkPolicy is a tenant's network-isolation policy, enforced at each of the
// tenant's container host-veth TC_INGRESS hooks (the sender side of every flow;
// see the Phase 0 findings in NETWORK-ISOLATION-DESIGN.md). #315.
message NetworkPolicy {
  // Tenant this policy applies to (required).
  string tenant = 1;

  // Allow container↔container traffic within the same tenant. When false, even
  // same-tenant peers can't reach each other.
  bool allow_intra_tenant = 2;

  // Allowed egress destination CIDRs (e.g. "10.0.0.0/8", "1.2.3.4/32").
  repeated string egress_cidrs = 3;

  // Allowed egress domains (e.g. "api.github.com"); the daemon resolves these
  // to CIDRs on a refresh loop and folds them into the egress allow set.
  repeated string egress_domains = 4;

  // Enforcement mode. Unspecified is treated as LOG_ONLY in Phase A.
  NetworkPolicyMode mode = 5;

  // Allow reaching the cloud metadata service (169.254.169.254). Default false:
  // the metadata IP is denied even if egress_cidrs/egress_domains would
  // otherwise cover it (deny-beats-allow for this one sensitive IP, since it
  // hands out cloud credentials). Set true only for a tenant that legitimately
  // needs instance metadata. #315 Phase D.
  bool allow_metadata = 6;

  // Source identifies who authored this policy: "" / "cli" for an operator via
  // `containarium network-policy set`, "cloud" for one synced from a cloud
  // control plane (#354). The cloud-actuation reconciler converges only its own
  // ("cloud") policies — so removing a policy cloud-side clears it on the host
  // without clobbering an operator's CLI-authored policy. Informational on
  // get/list.
  string source = 7;

  // Virtual-patch deny rules (#660). Each blocks traffic to a destination
  // CIDR (optionally scoped to a port/proto) and is evaluated BEFORE the
  // egress allow-list: deny beats allow, the same way the metadata IP does.
  // Use to "virtually patch" a known-vulnerable destination/service until the
  // real upstream fix ships — instant, in-kernel, zero downtime. A rule whose
  // expires_at is in the past is dropped at compile time, so the patch
  // self-removes once the fix lands.
  repeated NetworkPolicyDenyRule deny_rules = 8;
}

// NetworkPolicyDenyRule is one virtual-patch block rule (#660). Traffic from a
// tenant's container to the destination is denied — dropped in ENFORCE mode,
// audited (action network_policy.virtual_patch) in every mode. Deny beats the
// egress allow-list.
message NetworkPolicyDenyRule {
  // Destination CIDR to block (e.g. "1.2.3.4/32", "10.0.0.0/8"). Required.
  // IPv4 only (Phase A parses IPv4); a host IP is just a /32.
  string cidr = 1;

  // Optional destination port to scope the block (0 = any port). Lets a rule
  // target only the vulnerable service (e.g. a Redis CVE on 6379) without
  // blocking unrelated traffic to the same host.
  uint32 port = 2;

  // Optional IP protocol to scope the block: "tcp" | "udp" | "" (any).
  string proto = 3;

  // Operator note — typically the CVE id this rule virtual-patches. Echoed on
  // get/list and carried into the audit detail.
  string note = 4;

  // Optional RFC3339 expiry (e.g. "2026-07-01T00:00:00Z"). A rule past its
  // expiry is not installed into the kernel, so a virtual patch auto-removes
  // once the real fix is confirmed. Empty = no expiry.
  string expires_at = 5;
}

// --- NetworkPolicyService request/response messages (#315) ---

message SetNetworkPolicyRequest {
  NetworkPolicy policy = 1;
}
message SetNetworkPolicyResponse {
  // The stored policy (echoed back in its normalized form).
  NetworkPolicy policy = 1;
}

message GetNetworkPolicyRequest {
  string tenant = 1;
}
message GetNetworkPolicyResponse {
  NetworkPolicy policy = 1;
}

message ListNetworkPoliciesRequest {}
message ListNetworkPoliciesResponse {
  repeated NetworkPolicy policies = 1;
}

message DeleteNetworkPolicyRequest {
  string tenant = 1;
}
message DeleteNetworkPolicyResponse {}

// PatchNetworkPolicyDenyRulesRequest atomically mutates a tenant's virtual-patch
// deny rules (#660): the server reads the current rules, removes any whose CIDR
// is in remove_cidrs, adds/replaces the `add` rules (deny rules are keyed by
// CIDR — an add for an existing CIDR replaces it), re-normalizes, and writes
// back under a lock, so concurrent edits don't lose updates. The allow-policy
// (egress, mode, intra, metadata) is untouched. The normalized stored policy is
// echoed back.
message PatchNetworkPolicyDenyRulesRequest {
  string tenant = 1;
  repeated NetworkPolicyDenyRule add = 2;
  repeated string remove_cidrs = 3;
}

// NetworkPolicySignature is one operator-managed cleartext exploit signature
// (#661 Tier 2, PR-B). Unlike deny rules these are GLOBAL (fleet-wide), not
// tenant-scoped — an exploit pattern is matched against every scanned container's
// inbound payload. They augment the daemon's curated built-in set.
message NetworkPolicySignature {
  // Unique operator label, typically the CVE id (e.g. "CVE-2024-1234"). The
  // identity for upsert/delete.
  string name = 1;

  // The cleartext bytes to substring-match in the inbound payload, 1..32 bytes
  // (the BPF SIG_MAX_LEN). Matched as raw bytes; a longer pattern is rejected.
  string pattern = 2;

  // Whether this signature is active. Default true; a disabled signature is
  // stored but not loaded into the kernel scan.
  bool enabled = 3;

  // Assigned signature id (output only), echoed in the audit on a match. Operator
  // signatures get ids in a reserved high range so they never collide with the
  // built-in set's low ids.
  uint32 id = 4;

  // Optional operator note.
  string note = 5;
}

message SetNetworkPolicySignatureRequest {
  NetworkPolicySignature signature = 1;
}
message SetNetworkPolicySignatureResponse {
  NetworkPolicySignature signature = 1; // stored form, with the assigned id
}
message ListNetworkPolicySignaturesRequest {}
message ListNetworkPolicySignaturesResponse {
  repeated NetworkPolicySignature signatures = 1; // operator signatures only (built-ins are implicit)
}
message DeleteNetworkPolicySignatureRequest {
  string name = 1;
}
message DeleteNetworkPolicySignatureResponse {}

// BackendType represents the type of backend instance
enum BackendType {
  BACKEND_TYPE_UNSPECIFIED = 0;
  BACKEND_TYPE_GCP = 1;
  BACKEND_TYPE_TUNNEL = 2;
}

// BackendInfo describes one backend in the fleet — the local daemon
// plus any tunnel-connected peers. Emitted by ListBackends (GET
// /v1/backends). The field shape is the wire contract the CLI and MCP
// clients consume; it supersedes the hand-coded /v1/backends handler
// this RPC replaced (see #354).
message BackendInfo {
  // Unique backend identifier (e.g., "gcp-spot", "tunnel-node-a").
  string id = 1;

  // Backend kind: "local" for this daemon, "tunnel" for a peer.
  string type = 2;

  // Whether the backend is currently healthy / reachable.
  bool healthy = 3;

  // Containarium daemon version running on this backend (e.g. "0.21.0").
  string version = 4;

  // Hostname of the backend.
  string hostname = 5;

  // Seconds this backend has been up (local backend only).
  int64 uptime_seconds = 6;

  // RFC3339 timestamp this backend was last seen (peers).
  string last_seen_at = 7;

  // Operating-system string of the backend.
  string os = 8;

  // Number of containers currently running on this backend.
  int32 container_count = 9;

  // GPUs present on this backend.
  repeated BackendGPU gpus = 10;

  // Spare scheduling capacity this backend currently advertises to the
  // control plane, or null when nothing is advertised (withdrawn or never
  // published). Lets the control plane direct scheduling at hosts that have
  // explicitly offered freed headroom. See #680.
  CapacityHeadroom headroom = 11;

  // The backend's hardware capability profile recorded at join (hardware
  // class, a bounded CPU/memory micro-benchmark, and region), or null when no
  // profile has been recorded yet. Lets the control plane place work by
  // measured class rather than self-reported class alone. See #681.
  CapabilityProfile capability_profile = 12;
}

// CapabilityProfile is a backend's hardware capability snapshot recorded at
// join (and refreshable on demand): the hardware class derived from the host's
// system info + GPU probe, a lightweight bounded CPU/memory micro-benchmark,
// and the region. The control plane reads it through the backend surface to
// place work by measured capability rather than by the self-reported class
// alone, and to detect a backend whose measured class drifts from what it
// reports. See #681.
message CapabilityProfile {
  // Total physical CPU cores on the host (from SystemInfo.total_cpus).
  int32 cpu_cores = 1;

  // Best-effort CPU model/generation string (e.g. "AMD EPYC 7B13"), empty when
  // the host doesn't expose one.
  string cpu_model = 2;

  // Total RAM in bytes (from SystemInfo.total_memory_bytes).
  int64 total_memory_bytes = 3;

  // Total disk in bytes (from SystemInfo.total_disk_bytes).
  int64 total_disk_bytes = 4;

  // GPU model name from the existing nvidia.runtime passthrough probe
  // (ValidateGPU), empty on a CPU-only backend.
  string gpu_model = 5;

  // GPU driver version from the same probe, empty on a CPU-only backend.
  string gpu_driver_version = 6;

  // Whether the GPU passthrough probe saw a usable GPU.
  bool gpu_available = 7;

  // Region the backend serves (operator-set via --region; falls back to the
  // pool name). Empty when unset.
  string region = 8;

  // Self-reported hardware class the operator assigned the backend (e.g. the
  // pool name / declared tier), if any.
  string reported_class = 9;

  // Measured hardware class derived from the profile (e.g. "gpu", "cpu-large",
  // "cpu-small"). Coarse buckets; the control plane refines placement from the
  // raw figures.
  string measured_class = 10;

  // True when measured_class matches reported_class (or reported_class is
  // empty, treated as consistent). False flags a drift the control plane and
  // operator should reconcile.
  bool class_consistent = 11;

  // The bounded micro-benchmark result. See CapabilityBenchmark.
  CapabilityBenchmark benchmark = 12;

  // RFC3339 timestamp the profile was recorded.
  string profiled_at = 13;
}

// CapabilityBenchmark is a lightweight, time-bounded CPU/memory micro-benchmark
// run when the profile is recorded. The scores are relative integrity/capacity
// signals, not absolute hardware specs — they let the control plane confirm a
// backend's self-reported class is plausible. See #681.
message CapabilityBenchmark {
  // CPU score: integer-work iterations completed per second during the bounded
  // run (higher is faster). Single-threaded.
  int64 cpu_ops_per_sec = 1;

  // Memory score: bytes per second moved through a bounded buffer copy/sum
  // loop (higher is faster).
  int64 mem_bytes_per_sec = 2;

  // Wall-clock duration of the benchmark in milliseconds (bounded; the runner
  // caps each phase).
  int64 duration_ms = 3;
}

// CapacityHeadroom is a backend's explicit, policy-bounded offer of spare
// scheduling capacity to the control plane. Today a backend's capacity is
// implicit (derived from system info); a box that would otherwise scale down
// can instead publish its freed headroom here so the control plane can direct
// work at it. Surfaced through BackendInfo (ListBackends). See #680.
message CapacityHeadroom {
  // Whether an advertisement is currently active. False means the backend has
  // withdrawn (or never published) — the rest of the fields are then a stale
  // snapshot the control plane must ignore.
  bool advertised = 1;

  // Spare CPU cores the backend offers for control-plane-directed scheduling.
  int32 spare_cpus = 2;

  // Spare memory in bytes (derived from SystemInfo.available_memory_bytes,
  // bounded by policy headroom reservation).
  int64 spare_memory_bytes = 3;

  // Spare disk in bytes (derived from SystemInfo.available_disk_bytes,
  // bounded by policy headroom reservation).
  int64 spare_disk_bytes = 4;

  // Host-level idle fraction in [0,1]: the share of running user containers
  // currently idle (a host aggregate over the per-container idle signal). A
  // high value indicates a box that would scale down and can instead offer
  // its headroom. 0 when no signal is available.
  double idle_fraction = 5;

  // RFC3339 timestamp the advertisement was last (re)published.
  string advertised_at = 6;

  // The local policy that bounds this advertisement.
  CapacityPolicy policy = 7;
}

// CapacityPolicy bounds what a backend is willing to advertise. The
// advertisement only computes spare capacity when the current time falls
// inside the allowed window and respects the excluded workload classes.
// Operator-set per backend. See #680.
message CapacityPolicy {
  // Local-clock hour the advertisement window opens (0-23). When
  // window_start_hour == window_end_hour the window is always open.
  int32 window_start_hour = 1;

  // Local-clock hour the advertisement window closes (0-23, exclusive). May be
  // less than window_start_hour to express an overnight window (e.g. 22..6).
  int32 window_end_hour = 2;

  // Workload classes that must NOT be displaced or co-scheduled — running
  // containers carrying any of these classes are excluded from the idle/spare
  // computation, so a host running protected work never advertises it as free.
  // Matched against the container's "user.containarium.workload_class" label.
  repeated string excluded_workload_classes = 3;

  // Fraction of host resources to hold back as a safety reservation, in
  // [0,1). Spare = available * (1 - reserve_fraction). 0 means offer all
  // available headroom.
  double reserve_fraction = 4;
}

// BackendGPU describes one GPU on a backend.
message BackendGPU {
  // GPU vendor string (e.g. "GPU_VENDOR_NVIDIA").
  string vendor = 1;

  // Human-readable GPU model name.
  string model_name = 2;

  // Total VRAM in bytes.
  int64 vram_bytes = 3;
}

// ListBackendsRequest is the request to list available backends
message ListBackendsRequest {}

// ListBackendsResponse is the response from listing backends
message ListBackendsResponse {
  // List of available backends
  repeated BackendInfo backends = 1;
}

// AdvertiseCapacityRequest publishes (or republishes) this backend's spare
// scheduling headroom to the control plane, bounded by the supplied policy.
// See #680.
message AdvertiseCapacityRequest {
  // The local policy that bounds the advertisement. When omitted the backend
  // applies its current/default policy (always-open window, no exclusions, no
  // reservation).
  CapacityPolicy policy = 1;
}

// AdvertiseCapacityResponse returns the headroom the backend computed and is
// now advertising. When the policy window is closed, advertised is true but
// the spare figures are zero.
message AdvertiseCapacityResponse {
  CapacityHeadroom headroom = 1;
}

// WithdrawCapacityRequest withdraws any active advertisement. Idempotent —
// withdrawing when nothing is advertised succeeds and is a no-op.
message WithdrawCapacityRequest {
  // When true the backend also reclaims the guest workloads it had implicitly
  // offered, draining them gracefully within a bounded window instead of
  // hard-killing them. Each drained workload is stopped through the normal
  // stop path so the control plane observes a stop event and can reschedule.
  // When false (default) withdraw only flips the advertisement off and leaves
  // running guests untouched. See #682.
  bool drain = 1;

  // Bounded wall-clock budget (seconds) for the graceful drain. Once exhausted
  // any still-running candidate is force-stopped so the host is reliably
  // reclaimed (no wedge on repeated advertise/withdraw cycles). 0 applies the
  // backend default (120s). Only honored when drain is true.
  int32 drain_window_seconds = 2;
}

// WithdrawCapacityResponse confirms the backend is no longer advertising.
message WithdrawCapacityResponse {
  // The post-withdraw headroom (advertised=false).
  CapacityHeadroom headroom = 1;

  // Container names that drained gracefully within the window. Empty unless
  // the request set drain. See #682.
  repeated string drained = 2;

  // Container names that were force-stopped because the bounded window was
  // exhausted before they stopped gracefully.
  repeated string force_stopped = 3;

  // True when the graceful budget was exhausted and the backend fell back to
  // force-stopping the remaining workloads.
  bool drain_window_exceeded = 4;

  // Container name → error for guests that could NOT be stopped even after the
  // force fallback. A non-empty map means the host is NOT fully reclaimed —
  // the control plane must not treat those guests' resources as freed.
  map<string, string> failed = 5;
}

// GetCapacityHeadroomRequest reads the backend's current advertisement and the
// freshly recomputed spare figures, without changing advertise/withdraw state.
message GetCapacityHeadroomRequest {}

// GetCapacityHeadroomResponse returns the current headroom snapshot.
message GetCapacityHeadroomResponse {
  CapacityHeadroom headroom = 1;
}

// ProfileBackendRequest asks a backend to (re)record its capability profile:
// read system info, run the GPU passthrough probe and the bounded
// CPU/memory micro-benchmark, derive the measured class, and persist it. See
// #681.
message ProfileBackendRequest {
  // Backend to profile. Empty = the local/primary daemon's own host; a peer id
  // forwards to that peer (which profiles itself).
  string backend_id = 1;

  // Skip the GPU passthrough probe (which creates+deletes a throwaway LXC and
  // can take ~30s). The profile then records gpu_available=false. Useful on a
  // backend known to be CPU-only.
  bool skip_gpu = 2;
}

// ProfileBackendResponse returns the freshly recorded capability profile.
message ProfileBackendResponse {
  CapabilityProfile profile = 1;

  // Echoes the profiled backend ("" = local).
  string backend_id = 2;
}

// GetCapabilityProfileRequest reads a backend's last-recorded capability
// profile without re-running the benchmark/probe. See #681.
message GetCapabilityProfileRequest {
  // Backend to read. Empty = the local/primary daemon's own host.
  string backend_id = 1;
}

// GetCapabilityProfileResponse returns the last-recorded profile, or null when
// nothing has been profiled yet.
message GetCapabilityProfileResponse {
  CapabilityProfile profile = 1;

  // Echoes the backend ("" = local).
  string backend_id = 2;
}

// SelfMeasurement is a backend's signed integrity attestation, emitted by the
// daemon on its heartbeat. It hashes the daemon's own binary, the loaded
// in-kernel network-policy program object(s), and the policy/config state, then
// signs the canonical measurement with the node's identity key (the
// sentinel-issued peer leaf key reused from the peer-PKI plumbing; TPM-backed
// when a TPM is present, software-signed otherwise). The control plane reads
// this through the backend surface to detect tampering of a backend's control
// plane out of band of the backend's own reporting. The node-side half only:
// the control plane's verification/quarantine logic lives elsewhere. See #683.
message SelfMeasurement {
  // Hash algorithm used for every component digest below (e.g. "sha256").
  string hash_algorithm = 1;

  // Hex-encoded digest of the running daemon binary on disk.
  string binary_digest = 2;

  // Hex-encoded digests of the loaded in-kernel network-policy program
  // object(s), in stable (sorted) order. Empty when no program object is
  // configured on this backend.
  repeated ProgramDigest program_digests = 3;

  // Hex-encoded digest of the canonicalized policy/config state (the
  // integrity-relevant daemon configuration + active network-policy posture).
  string config_digest = 4;

  // Hex-encoded digest of the canonical measurement bytes that were signed
  // (binds all components together). The signature below covers exactly these
  // bytes.
  string measurement_digest = 5;

  // Signature over the canonical measurement bytes, base64-encoded.
  string signature = 6;

  // Signature scheme used (e.g. "ecdsa-p256-sha256"). Empty when the daemon had
  // no identity key available and the measurement is unsigned (signature empty).
  string signature_algorithm = 7;

  // Whether the signature was produced by a TPM-backed key. False = the
  // software identity key (sentinel-issued peer leaf) signed it.
  bool tpm_backed = 8;

  // Whether an identity key was available to sign. False means the measurement
  // is present but unsigned (no peer PKI bootstrapped yet); the control plane
  // treats an unsigned measurement as unverifiable, not as tamper.
  bool signed = 9;

  // PEM of the signing certificate (the peer leaf), so the control plane can
  // verify the signature against the sentinel CA chain without a side lookup.
  // Empty when unsigned.
  string signing_cert_pem = 10;

  // RFC3339 timestamp the measurement was taken.
  string measured_at = 11;

  // Daemon version that produced the measurement.
  string daemon_version = 12;
}

// ProgramDigest is one loaded in-kernel program object's identity + digest.
message ProgramDigest {
  // Stable name/path identifying the program object (e.g. the configured BPF
  // object path).
  string name = 1;

  // Hex-encoded digest of the program object bytes.
  string digest = 2;
}

// GetSelfMeasurementRequest asks a backend to compute and sign a fresh self
// measurement. See #683.
message GetSelfMeasurementRequest {
  // Backend to measure. Empty = the local/primary daemon's own host; a peer id
  // forwards to that peer (which measures itself).
  string backend_id = 1;
}

// GetSelfMeasurementResponse returns the freshly computed signed measurement.
message GetSelfMeasurementResponse {
  SelfMeasurement measurement = 1;

  // Echoes the measured backend ("" = local).
  string backend_id = 2;
}
