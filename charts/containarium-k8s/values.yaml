# Default values for containarium-k8s.
# This is a YAML-formatted file.

# -- Containarium daemon image
daemon:
  image:
    repository: ghcr.io/footprintai/containarium
    # -- Defaults to chart appVersion when empty
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  # -- JWT secret for API authentication. Must be 32+ characters. CHANGE THIS.
  jwtSecret: "change-me-please-use-a-real-secret"
  service:
    type: ClusterIP
    port: 8080
  resources: {}

# -- Box image deployed per tenant (sshd + agent-box)
agentBox:
  image: ghcr.io/footprintai/containarium-agent-box:latest
  # -- Session behavior: "" or "mcp" pins every SSH session to the agent-box
  # MCP server (forced command — the secure default); "shell" gives an
  # interactive login shell (developer-box). See values-devbox.yaml.
  mode: ""

# -- SSH gateway configuration (sshpiper routes SSH connections to box pods)
gateway:
  # -- Kubernetes namespace where the sshpiper Deployment lives and Pipes are created
  namespace: agent-gateway
  # -- Deploy sshpiper as part of this chart. Set false to bring your own.
  enabled: true
  service:
    # -- NodePort for kind; LoadBalancer for cloud. See values-gke.yaml /
    # values-eks.yaml for ready-made managed-Kubernetes presets.
    type: NodePort
    port: 22
    # -- NodePort for kind (access via localhost:32022)
    nodePort: 32022
    # -- Extra annotations for the gateway Service. This is where cloud
    # LoadBalancer knobs go (NLB type on EKS, L4 mode / internal on GKE);
    # merged over commonAnnotations. See the cloud value presets.
    annotations: {}
  sshpiper:
    # -- Containarium's own gateway image (pinned upstream sshpiperd release +
    # kubernetes-plugin entrypoint), published per Containarium release by
    # sidecars.yml. The previously pinned ghcr.io/tg123/... path was never
    # published upstream and 403s on pull (#976).
    image: ghcr.io/footprintai/containarium-sshpiper:latest-stable
    # -- Secret holding sshpiperd's host key under the `server_key` field.
    # Create before enabling the gateway:
    #   ssh-keygen -t ed25519 -f host_key -N ""
    #   kubectl -n <gateway ns> create secret generic sshpiper-server-key --from-file=server_key=host_key
    serverKeySecret: sshpiper-server-key
    resources: {}

# -- Box CRD operator (issue #995): run the Box controller so
# `kubectl apply -f box.yaml` (and GitOps) create boxes declaratively, alongside
# the imperative API. Ships the boxes.containarium.dev CRD in crds/. Off by
# default — enabling only starts the reconcile loop; the API path is unchanged.
operator:
  enabled: false

# -- Prefix for per-tenant Kubernetes namespaces (tenant → tenant-<name>)
tenantNamespacePrefix: "tenant-"

# -- StorageClass for per-box persistent volume claims.
# Empty = no PVC (box data is ephemeral). Use "standard" for kind.
storageClass: ""

# -- Annotations to add to all resources
commonAnnotations: {}

# -- Labels to add to all resources
commonLabels: {}
