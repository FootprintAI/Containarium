name: gofmt

# Enforce gofmt across the Go tree. The repo had drifted (89 files swept
# clean in #542); this gate keeps it clean so formatting noise never rides
# along in unrelated diffs again. Deliberately just gofmt — not a full
# golangci-lint run — so it enforces formatting without pulling in the
# linter set's pre-existing vet/staticcheck debt (a separate effort).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gofmt:
    name: gofmt check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.11'

      - name: Check gofmt
        run: |
          set -euo pipefail
          # gofmt -s -l lists files whose formatting differs from gofmt's,
          # including the -s simplifications (e.g. `T{}` composite-literal
          # elision, redundant slice/range cleanups). Empty output = clean.
          # Matches the cloud repo's golangci gofmt formatter, which runs
          # with simplify on by default. Use the toolchain's gofmt (matches
          # the pinned Go above) so contributors get identical results.
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean. Run 'gofmt -s -w .' and commit:"
            echo "$unformatted"
            exit 1
          fi
          echo "All Go files are gofmt -s clean."
